openapi: 3.1.0
x-stoplight:
  id: ajihms1g0ujrv
info:
  title: Payments
  version: '4.0'
  summary: Create and manage payments and payment instruments
  description: ''
  contact:
    name: GoPay technical support
    email: integration@gopay.com
servers:
  - url: 'https://api.sandbox.gopay.com/api/merchant/payments/4.0'
    description: Sandbox
  - url: 'https://api.gopay.com/api/merchant/payments/4.0'
    description: Production
paths:
  /oauth2/token:
    post:
      summary: Authenticate
      tags:
        - Authentication
      operationId: post-oauth2-token
      x-stoplight:
        id: 76hckee4qpnkr
      security:
        - {}
        - httpBasic: []
      parameters:
        - $ref: '#/components/parameters/Accept-Json'
        - schema:
            type: string
          in: header
          name: Authorization
          description: Only applies to the `client_credentials` grant_type.
          example: 'Basic {username:password in base64}'
      requestBody:
        $ref: '#/components/requestBodies/Access-Token-Request'
      responses:
        '200':
          $ref: '#/components/responses/Token-Pair-Response'
        '400':
          $ref: '#/components/responses/Bad-Request-400-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - error
                  - message
                  - detail
                  - path
                  - timestamp
                properties:
                  code:
                    type: integer
                    format: int32
                    example: 500
                    description: HTTP status code
                  error:
                    type: string
                    example: INTERNAL_SERVER_ERROR
                    description: Error type
                  message:
                    type: string
                    example: Unexpected server error
                    description: Error message
                  detail:
                    type: string
                    example: Error Details
                    description: Detailed error description
                  path:
                    type: string
                    example: /oauth2/token
                    description: Request path
                  timestamp:
                    type: string
                    format: date-time
                    example: '2025-12-10T10:30:00Z'
                    description: Error timestamp
              examples:
                Example 1:
                  value:
                    code: 500
                    error: INTERNAL_SERVER_ERROR
                    message: Unexpected server error
                    detail: Error Details
                    path: /oauth2/token
                    timestamp: '2025-12-10T10:30:00Z'
  '/eshops/{goid}/payments':
    parameters:
      - schema:
          type: string
        name: goid
        in: path
        required: true
    post:
      summary: Create a payment
      tags:
        - Payments
      responses:
        '201':
          $ref: '#/components/responses/Payment-Status-Response'
        '400':
          $ref: '#/components/responses/Bad-Request-400-Response'
        '401':
          description: Unauthorized
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '409':
          $ref: '#/components/responses/Conflict-409-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      operationId: post-eshops-goid-payments
      x-stoplight:
        id: ho0hek857ajwi
      parameters:
        - $ref: '#/components/parameters/Accept-Json'
      requestBody:
        $ref: '#/components/requestBodies/Payment-Create-Request'
      security:
        - clientCredentials:
            - 'payment:create'
  '/payments/{payment_id}':
    get:
      summary: Payment Status
      tags:
        - Payments
      responses:
        '200':
          $ref: '#/components/responses/Payment-Status-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      operationId: get-payments-payment_id
      x-stoplight:
        id: uopz86vn777hk
      security:
        - clientCredentials:
            - 'payment:read'
    parameters:
      - schema:
          type: string
        name: payment_id
        in: path
        required: true
  '/payments/{payment_id}/charge':
    parameters:
      - schema:
          type: string
        name: payment_id
        in: path
        required: true
    post:
      summary: Charge a payment
      tags:
        - Payments
      responses:
        '201':
          $ref: '#/components/responses/Payment-Charge-Response'
        '400':
          $ref: '#/components/responses/Bad-Request-400-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '409':
          $ref: '#/components/responses/Conflict-409-Response'
        '500':
          description: Internal Server Error
      operationId: post-payments-payment_id-charge
      x-stoplight:
        id: eusfzuq09tokk
      security:
        - clientCredentials:
            - 'payment:create'
      requestBody:
        $ref: '#/components/requestBodies/Payment-Charge-Request'
      parameters:
        - $ref: '#/components/parameters/Accept-Json'
    get:
      summary: Payment charge state
      tags:
        - Payments
      responses:
        '200':
          $ref: '#/components/responses/Payment-Charge-State-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      operationId: get-payments-payment_id-charge
      x-stoplight:
        id: iq1t885ia1tlh
      security:
        - clientCredentials:
            - 'payment:read'
  '/payments/{payment_id}/qr-payment/info':
    parameters:
      - schema:
          type: string
        name: payment_id
        in: path
        required: true
    get:
      summary: QR Payment Info
