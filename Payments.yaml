    JWE:
      title: JWE
      x-stoplight:
        id: ssz9qqzasc97h
      type: string
      description: |-
        The structure containing the encrypted payload. It is described by [RFC 7516: JSON Web Encryption (JWE)](https://datatracker.ietf.org/doc/html/rfc7516)

        The JWE has 5 parts:
        1. `header` -> contains JSON serialized [JWE header](#jwe-header)
        2. `encrypted_key` -> contains the CEK (Content Encryption Key) encrypted by the public JWK
        3. `iv` -> initiation vector used for content encryption
        4. `ciphertext` -> contains the [Encrypted card](#encrypted-card)
        5. `tag` -> encryption authentication tag

        Each of these parts is Base64URL-encoded and concatenated using dots so the overall structure is:
        `BASE64URL(header).BASE64URL(encrypted_key).BASE64URL(iv).BASE64URL(ciphertext).BASE64URL(tag)`
      examples:
        - eyJalgIjoiUlNBLU9BRVAtMjU2IiwiZW5jIjoiQTI1NkdDTSIsImtpZCI6ImtleV8yMDI1MDQwNl8wMDEifQ.aG93ZGlkYmFzZTY0.dGhpc2lzdGhlaXY.ZW5jcnlwdGVkY2FyZGhvbGRlcmRhdGE.YXV0aHRhZw
    JWE-header:
      title: JWE-header
      x-stoplight:
        id: wrqnni8r8w73w
      type: object
      description: 'The header for the JWE payload described by [RFC 7516 Section 4](https://datatracker.ietf.org/doc/html/rfc7516#section-4)'
      examples:
        - alg: RSA-OAEP-256
          enc: A256GCM
          kid: key_20250406
          typ: JWE
      required:
        - alg
        - enc
        - kid
        - typ
      properties:
        alg:
          type: string
          example: RSA-OAEP-256
          x-stoplight:
            id: el6d41dkwq96s
          description: Must be same as JWK
        enc:
          type: string
          default: A256GCM
          example: A256GCM
          x-stoplight:
            id: 2bvugej7b54ex
          description: The algorithm used to encrypt the content. `A256GCM` is preferred.
        kid:
          type: string
          x-stoplight:
            id: 1h1pqyq0kw929
          description: Must be same as JWK
        typ:
          type: string
          x-stoplight:
            id: jo6hro2546fwd
          const: JWE
          example: JWE
