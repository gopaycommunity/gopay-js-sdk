openapi: 3.1.0
info:
  version: '4.0'
  title: Payments
  summary: Create and manage payments
  description: ''
  contact:
    name: GoPay technical support
    email: integration@gopay.com
servers:
  - url: 'https://payments-api-mock.beta.gopay.com/'
    description: Mock server
  - url: 'https://gw.sandbox.gopay.com/gp-gw/api/4.0'
    description: Sandbox
  - url: 'https://gate.gopay.com/gp-gw/api/4.0'
    description: Production
paths:
  /oauth2/token:
    post:
      tags:
        - Authentication
      summary: Authenticate
      operationId: post-oauth2-token
      requestBody:
        required: true
        $ref: '#/components/requestBodies/Access-Token-Request'
      responses:
        '200':
          description: Shared Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Access-Token'
        '400':
          $ref: '#/components/responses/Bad-Request-400-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      security:
        - basic: []
  '/eshops/{goid}/payments':
    post:
      tags:
        - Payments
      summary: Create a payment
      operationId: post-eshops-goid-payments
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment-Details'
        '400':
          $ref: '#/components/responses/Bad-Request-400-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '409':
          $ref: '#/components/responses/Conflict-409-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Payment-Create-Request'
      security:
        - merchant_credentials:
            - 'payment:write'
    parameters:
      - schema:
          type: string
        name: goid
        in: path
        required: true
        description: Unique identifier of a registered merchant website
  '/payments/{payment_id}':
    get:
      tags:
        - Payments
      summary: Payment Status
      operationId: get-payments-payment_id
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment-Details'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      security:
        - merchant_credentials:
            - 'payment:read'
        - payment_credentials:
            - 'payment:read'
    parameters:
      - schema:
          type: string
        name: payment_id
        in: path
        required: true
        description: Payment ID
  '/payments/{payment_id}/charge':
    post:
      tags:
        - Payments
      summary: Charge a payment
      operationId: post-payments-payment_id-charge
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment-Charge-Response'
        '400':
          $ref: '#/components/responses/Bad-Request-400-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '409':
          $ref: '#/components/responses/Conflict-409-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Payment-Charge-Input'
      security:
        - merchant_credentials:
            - 'payment:write'
        - payment_credentials:
            - 'payment:charge'
    get:
      tags:
        - Payments
      summary: Payment charge state
      operationId: get-payments-payment_id-charge
      responses:
        '200':
          description: Shared Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment-Charge-Status-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      security:
        - merchant_credentials:
            - 'payment:read'
        - payment_credentials:
            - 'payment:read'
    parameters:
      - schema:
          type: string
        name: payment_id
        in: path
        required: true
        description: Payment ID
  '/payments/{payment_id}/qr-payment/info':
    get:
      tags:
        - Payments
      summary: QR Payment Info
      operationId: get-payments-payment_id-qr-payment-info
      parameters:
        - name: format
          in: query
          description: File format of the generated base64
          schema:
            type: string
            enum:
              - png
              - svg
            default: png
            examples:
              - png
      responses:
        '200':
          description: Shared Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QR-Payment-Details'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '409':
          $ref: '#/components/responses/Conflict-409-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      security:
        - merchant_credentials:
            - 'payment:read'
        - payment_credentials:
            - 'payment:read'
    parameters:
      - schema:
          type: string
        name: payment_id
        in: path
        required: true
        description: Payment ID
  '/payments/{payment_id}/google-pay/info':
    get:
      tags:
        - Payments
      summary: Google Pay Payment Info
      operationId: get-payments-payment_id-info-google-pay
      responses:
        '200':
          $ref: '#/components/responses/Google-Pay-Info-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '409':
          $ref: '#/components/responses/Conflict-409-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      security:
        - payment_credentials:
            - 'payment:read'
        - merchant_credentials:
            - 'payment:read'
    parameters:
      - schema:
          type: string
        name: payment_id
        in: path
        required: true
        description: Payment ID
  '/payments/{payment_id}/apple-pay/info':
    get:
      tags:
        - Payments
      summary: Apple Pay Payment Info
      operationId: get-payments-payment_id-info-apple-pay
      responses:
        '200':
          $ref: '#/components/responses/Apple-Pay-Info-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '409':
          $ref: '#/components/responses/Conflict-409-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      security:
        - payment_credentials:
            - 'payment:read'
        - merchant_credentials:
            - 'payment:read'
    parameters:
      - schema:
          type: string
        name: payment_id
        in: path
        required: true
        description: Payment ID
  '/payments/{payment_id}/apple-pay/app-info':
    get:
      tags:
        - Payments
      summary: Apple Pay Payment Info For Apps
      operationId: get-payments-payment_id-apple-pay-app-info
      responses:
        '200':
          $ref: '#/components/responses/Apple-Pay-App-Info-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '409':
          $ref: '#/components/responses/Conflict-409-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      security:
        - payment_credentials:
            - 'payment:read'
        - merchant_credentials:
            - 'payment:read'
    parameters:
      - schema:
          type: string
        name: payment_id
        in: path
        required: true
        description: Payment ID
  '/payments/{payment_id}/apple-pay/validate':
    post:
      tags:
        - Payments
      summary: Validate Merchant
      operationId: post-payments-payment_id-apple-pay-validate
      parameters:
        - name: Origin
          in: header
          description: The origin of the document where the payment button is displayed (added automatically in AJAX)
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Shared Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Validate-Merchant-Response'
        '400':
          $ref: '#/components/responses/Bad-Request-400-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '409':
          $ref: '#/components/responses/Conflict-409-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      security:
        - payment_credentials:
            - 'payment:read'
        - merchant_credentials:
            - 'payment:read'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Validate-Merchant-Request'
    parameters:
      - schema:
          type: string
        name: payment_id
        in: path
        required: true
        description: Payment ID
  '/payments/{payment_id}/refunds':
    post:
      summary: Refund a payment
      operationId: post-payments-payment_id-refunds
      parameters: []
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Refund-Details'
        '400':
          $ref: '#/components/responses/Bad-Request-400-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '409':
          $ref: '#/components/responses/Conflict-409-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      security:
        - merchant_credentials:
            - 'payment:write'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Refund-Create-Request'
      tags:
        - Refunds
    parameters:
      - schema:
          type: string
        name: payment_id
        in: path
        required: true
        description: Payment ID
    get:
      summary: List payment refunds
      tags:
        - Refunds
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Refund-Details'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      operationId: get-payments-payment_id-refunds
      security:
        - merchant_credentials:
            - 'payment:read'
        - payment_credentials:
            - 'payment:read'
  '/refunds/{refund_id}':
    parameters:
      - schema:
          type: string
        name: refund_id
        in: path
        required: true
    get:
      summary: Refund details
      tags:
        - Refunds
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Refund-Details'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      operationId: get-refunds-refund_id
      security:
        - merchant_credentials:
            - 'payment:read'
  /cards/tokens:
    post:
      tags:
        - Cards
      summary: Create card token
      operationId: post-cards-tokens
      responses:
        '201':
          description: Shared Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Permanent-Card-Token-Details'
        '400':
          $ref: '#/components/responses/Bad-Request-400-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '409':
          $ref: '#/components/responses/Conflict-409-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Token-Create-Request'
      security:
        - merchant_credentials:
            - 'card:write'
  '/cards/tokens/{card_id}':
    get:
      tags:
        - Cards
      summary: Card details
      operationId: get-cards-tokens-card_id
      parameters:
        - name: card_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Shared Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Permanent-Card-Token-Details'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      security:
        - merchant_credentials:
            - 'card:read'
    delete:
      tags:
        - Cards
      summary: Delete a card
      operationId: delete-cards-tokens-card_id
      parameters:
        - name: card_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      security:
        - merchant_credentials:
            - 'card:write'
    parameters:
      - schema:
          type: string
        name: card_id
        in: path
        required: true
        description: ID of the saved payment card
  /cards/public-key:
    get:
      tags:
        - Cards
      summary: Fetch public key
      description: |-
        Returns the public encryption key to be used for encrypting card data.

        It is structured as a JWK described by [RFC 7517](https://datatracker.ietf.org/doc/html/rfc7517)
      operationId: get-encryption-public-key
      responses:
        '200':
          description: Shared Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWK'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      security:
        - shareable_key: []
        - merchant_credentials:
            - 'shared:read'
  /cards/card-form-url:
    get:
      tags:
        - Cards
      summary: Card Form URL
      description: Returns the URL of the hosted card input form
      operationId: get-card-form-url
      responses:
        '200':
          description: Shared Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card-Form-URL'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      security:
        - shareable_key: []
        - merchant_credentials:
            - 'shared:read'
  '/eshops/{goid}/recurrences':
    parameters:
      - schema:
          type: string
        name: goid
        in: path
        description: Unique identifier of a registered merchant website
        required: true
    post:
      summary: Create a recurrence
      tags:
        - Recurrences
      responses:
        '201':
          description: Shared Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recurrence-Details'
        '400':
          $ref: '#/components/responses/Bad-Request-400-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '409':
          $ref: '#/components/responses/Conflict-409-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      operationId: post-eshops-goid-recurrences
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Recurrence-Create-Request'
      security:
        - merchant_credentials:
            - 'payment:write'
  '/recurrences/{rec_id}':
    parameters:
      - schema:
          type: string
        name: rec_id
        in: path
        required: true
        description: Unique ID of a previously created recurrence
    get:
      summary: Recurrence status
      tags:
        - Recurrences
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recurrence-Details'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      operationId: get-recurrences-rec_id
      security:
        - merchant_credentials:
            - 'payment:read'
    delete:
      summary: Stop a recurrence
      tags:
        - Recurrences
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '409':
          $ref: '#/components/responses/Conflict-409-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      operationId: delete-recurrences-rec_id
      security:
        - merchant_credentials:
            - 'payment:write'
  '/recurrences/{rec_id}/start':
    parameters:
      - schema:
          type: string
        name: rec_id
        in: path
        required: true
        description: Unique ID of a previously created recurrence
    post:
      summary: Start a recurrence
      tags:
        - Recurrences
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment-Details'
        '400':
          $ref: '#/components/responses/Bad-Request-400-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '409':
          $ref: '#/components/responses/Conflict-409-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      operationId: post-recurrences-rec_id-start
      requestBody:
        description: Shared Request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Payment-Instance-Override'
      security:
        - merchant_credentials:
            - 'payment:write'
  '/recurrences/{rec_id}/next':
    parameters:
      - schema:
          type: string
        name: rec_id
        in: path
        required: true
        description: Unique ID of a previously created recurrence
    post:
      summary: Create a next payment for a recurrence
      tags:
        - Recurrences
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment-Details'
        '400':
          $ref: '#/components/responses/Bad-Request-400-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '409':
          $ref: '#/components/responses/Conflict-409-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      operationId: post-recurrences-rec_id-next
      requestBody:
        description: Shared Request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Payment-Instance-Override'
      security:
        - merchant_credentials:
            - 'payment:write'
  '/eshops/{goid}/links':
    parameters:
      - schema:
          type: string
        name: goid
        description: Unique identifier of a registered merchant website
        in: path
        required: true
    post:
      summary: Create a payment link
      responses:
        '201':
          description: Shared Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link-Details'
        '400':
          $ref: '#/components/responses/Bad-Request-400-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      operationId: post-eshops-goid-links
      tags:
        - Links
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Link-Create-Request'
      security:
        - merchant_credentials:
            - 'payment:write'
  '/links/{link_id}':
    parameters:
      - schema:
          type: string
        name: link_id
        in: path
        required: true
        description: Unique ID of a previously created link
    get:
      summary: Link status
      tags:
        - Links
      responses:
        '200':
          description: Shared Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link-Details'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      operationId: get-links-link_id
      security:
        - merchant_credentials:
            - 'payment:read'
    delete:
      summary: Disable a link
      tags:
        - Links
      responses:
        '204':
