          description: Callback urls
    Currency:
      type: string
      enum:
        - CZK
        - EUR
        - PLN
        - USD
        - GBP
        - HUF
        - RON
      description: Supported payment currencies in ISO 4217 format
      examples:
        - CZK
    Additional-Param:
      type: object
      title: Additional Parameter
      description: Additional payment parameters
      properties:
        name:
          type: string
          description: Parameter name
          examples:
