openapi: 3.1.0
x-stoplight:
  id: ajihms1g0ujrv
info:
  title: Payments
  version: '4.0'
  summary: Create and manage payments and payment instruments
  description: ''
  contact:
    name: GoPay technical support
    email: integration@gopay.com
servers:
  - url: 'https://api.sandbox.gopay.com/api/merchant/payments/4.0'
    description: Sandbox
  - url: 'https://api.gopay.com/api/merchant/payments/4.0'
    description: Production
paths:
  /oauth2/token:
    post:
      summary: Authenticate
      tags: []
      responses:
        '200':
          $ref: '#/components/responses/Token-Pair-Response'
      operationId: post-oauth2-token
      x-stoplight:
        id: 76hckee4qpnkr
      security:
        - {}
        - httpBasic: []
      parameters:
        - $ref: '#/components/parameters/Accept-Json'
        - schema:
            type: string
          in: header
          name: Authorization
          description: Only applies to the `client_credentials` grant_type.
          example: 'Basic {username:password in base64}'
      requestBody:
        $ref: '#/components/requestBodies/Access-Token-Request'
  /encryption/public-key:
    get:
      summary: Fetch public key
      tags: []
      responses:
        '200':
          $ref: '#/components/responses/JWK-Response'
      operationId: get-encryption-public-key
      x-stoplight:
        id: fzmjk8f7jgxx5
      description: |-
        Returns the public encryption key to be used for encrypting card data.

        It is structured as a JWK described by [RFC 7517](https://datatracker.ietf.org/doc/html/rfc7517)
      security:
        - clientCredentials:
            - 'card:save'
      parameters:
        - $ref: '#/components/parameters/Accept-Json'
  /cards/tokens:
    post:
      summary: Create card token
      tags: []
      responses:
        '201':
          $ref: '#/components/responses/Card-Token-Response'
      operationId: post-cards-tokens
      x-stoplight:
        id: z527w3pj6p22i
      security:
        - clientCredentials:
            - 'card:save'
      parameters:
        - $ref: '#/components/parameters/Accept-Json'
      requestBody:
        $ref: '#/components/requestBodies/Card-Token-Request'
  '/payments/{payment_id}/charge':
    parameters:
      - schema:
          type: string
        name: payment_id
        in: path
        required: true
    post:
      summary: Charge payment (preview)
      tags: []
      responses:
        '201':
          $ref: '#/components/responses/Payment-Charge-Response'
      operationId: post-payments-payment_id-charge
      x-stoplight:
        id: eusfzuq09tokk
      security:
        - clientCredentials:
            - 'payment:create'
      requestBody:
        $ref: '#/components/requestBodies/Payment-Charge-Request'
      parameters:
        - $ref: '#/components/parameters/Accept-Json'
  '/eshops/{goid}/payments':
    parameters:
      - schema:
          type: string
        name: goid
        in: path
        required: true
    post:
      summary: Create a payment
      tags: []
      responses:
        '201':
          $ref: '#/components/responses/Payment-Create-Response'
      operationId: post-eshops-goid-payments
      x-stoplight:
        id: ho0hek857ajwi
      parameters:
        - $ref: '#/components/parameters/Accept-Json'
      requestBody:
        $ref: '#/components/requestBodies/Payment-Create-Request'
  '/payments/{payment_id}/info/google-pay':
    parameters:
      - schema:
          type: string
        name: payment_id
        in: path
        required: true
    get:
      summary: Google Pay Payment Info
      tags: []
      responses:
        '200':
          $ref: '#/components/responses/Google-Pay-Info-Response'
      operationId: get-payments-payment_id-info-google-pay
      x-stoplight:
        id: o935ttq3967v5
      parameters:
        - schema:
            type: string
            example: application/json
            default: application/json
          in: header
          name: Accept
          description: application/json
  '/payments/{payment_id}/apple-pay/info':
    parameters:
      - schema:
          type: string
        name: payment_id
        in: path
        required: true
    get:
      summary: Apple Pay Payment Info
      tags: []
      responses:
        '200':
          $ref: '#/components/responses/Apple-Pay-Info-Response'
      operationId: get-payments-payment_id-info-apple-pay
      parameters:
        - schema:
            type: string
            example: application/json
            default: application/json
          in: header
          name: Accept
          description: application/json
      x-stoplight:
        id: ewnyiw719coe8
  '/payments/{payment_id}/apple-pay/validate':
    parameters:
      - schema:
          type: string
        name: payment_id
        in: path
        required: true
    post:
      summary: Validate Merchant
      tags: []
      responses:
        '200':
          $ref: '#/components/responses/Validate-Merchant-Response'
      operationId: get-payments-payment_id-apple-pay-validate
      x-stoplight:
        id: gb1p7yi5l70cd
      parameters:
        - schema:
            type: string
          in: header
          name: Origin
          description: The origin of the document where the payment button is displayed (added automatically in AJAX)
          required: true
components:
  schemas:
    Token-Scope:
      title: Token Scope
      x-stoplight:
        id: 9hljgzmc9vd6y
      enum:
        - 'card:save'
        - 'card:read'
        - 'payment:create'
        - 'payment:read'
    Client-Credentials-Request:
      title: Client Credentials Request
      x-stoplight:
        id: ae4lyuzkwrcpv
      type: object
      examples:
        - grant_type: client_credentials
          scope: 'payment:create payment:read'
      required:
        - grant_type
        - scope
      properties:
        grant_type:
          type: string
          const: client_credentials
          example: client_credentials
          x-stoplight:
            id: u47ylvp7tc3nz
          description: Always `client_credentials` for this flow
        scope:
          x-stoplight:
            id: 5t619bidw05e0
          type: string
          example: 'payment:create payment:read'
          description: 'List of required token scopes, separated with a space. See Token Scope schema for possible values.'
    Refresh-Token-Request:
      title: Refresh Token Request
      x-stoplight:
        id: m04y2ncd42qyw
      type: object
      examples:
        - grant_type: refresh_token
          refresh_token: 2f53a04d4dd749f6a2a81285da72f67a
          client_id: '123456'
      required:
        - grant_type
        - refresh_token
        - client_id
      properties:
        grant_type:
          type: string
          const: refresh_token
          example: refresh_token
        refresh_token:
          type: string
          x-stoplight:
            id: 7vi9r0rbbnrpr
          description: Refresh token value from previous authentication
        client_id:
          type: string
          x-stoplight:
            id: x78lboi99jhfe
          description: Client ID associated with the refresh token. This can be extracted from the JWT.
    JWT:
      title: JWT
      x-stoplight:
        id: 2yhqy5pem5rkm
      type: string
      description: |-
        The JWT string as described by [RFC 7519: JSON Web Token (JWT)](https://datatracker.ietf.org/doc/html/rfc7519)

        The JWT has 3 parts:
        1. `header` -> JSON serialized [JWT header](#jwt-header)
        2. `claims` -> Contains the main part of the token - see [JWT Claims](#jwt-claims) for details
        3. `signature` -> Contains the cryptographic signature of the token

        Each of these parts is Base64URL-encoded and concatenated using dots so the overall structure is:
        `BASE64URL(header).BASE64URL(claims).BASE64URL(signature)`
      examples:
        - ewogICJhbGciOiAiSFMyNTYiLAogICJ0eXAiOiAiSldUIiwKICAia2lkIjogImtleS0yMDI1LTA0Igp9.ewogICJzdWIiOiAiY2xpZW50X2lkXzEyMyIsCiAgInNjb3BlIjogInBheW1lbnRzOnJlYWQgcGF5bWVudHM6d3JpdGUiLAogICJpYXQiOiAxNzEyNjQwMDAwLAogICJleHAiOiAxNzEyNjQzNjAwCn0.bWlrZWhlcmVfaXMtbXktc3VwZXJzZWNyZXQtbGlrZQ
      format: jwt
    JWT-header:
      title: JWT-header
      x-stoplight:
        id: q132gwiib06ov
      type: object
      examples:
        - alg: HS256
          typ: JWT
          kid: key-2025-04
      required:
        - alg
        - typ
        - kid
      properties:
        alg:
          type: string
          const: HS256
          example: HS256
          x-stoplight:
            id: 29g0cs0uih4bl
        typ:
          type: string
          const: JWT
          example: JWT
          x-stoplight:
            id: akd8sbadr9eeb
        kid:
          type: string
          example: key-2025-04
          x-stoplight:
            id: 90avrb11vcz01
          description: Key ID that was used to sign the token
    JWT-claims:
      title: JWT-claims
      x-stoplight:
        id: 1t7u4tgwic485
      type: object
      properties:
        sub:
          type: string
          x-stoplight:
            id: v7u8u16kyswxt
          description: The client ID for which the token has been issued
        scope:
          type: string
          x-stoplight:
            id: lbfufsbk465oi
          description: 'Space-separated list of [scopes](#scope)'
        iat:
          type: integer
          x-stoplight:
            id: p4cxvjh5cta6a
          description: Timestamp of when the token was issued
        exp:
          type: integer
          x-stoplight:
            id: g1hr5bhrxehmp
          description: Timestamp of the token expiration
      examples:
        - sub: client_id_123
          scope: 'payments:read payments:write'
          iat: 1712640000
          exp: 1712643600
    JWK:
      title: JWK
      x-stoplight:
        id: i2hcv8htc7pvo
      type: object
      description: 'The structure of the public encryption key. It is formatted according to RFC 7515: JSON Web Key (JWK)'
      examples:
        - kty: RSA
          kid: key_20250406
          use: enc
          alg: RSA-OAEP-256
          'n': y7WkT3qvY...
          e: AQAB
      required:
        - kty
        - use
        - kid
        - alg
        - 'n'
        - e
      properties:
        kty:
          type: string
          const: RSA
          example: RSA
          x-stoplight:
            id: muusoexy36j6v
        use:
          type: string
          const: enc
          example: enc
          x-stoplight:
            id: hxpizgv64jvva
        kid:
          type: string
          x-stoplight:
            id: 4egqi8fvhbnzc
          description: Key ID
          example: key_20250406
        alg:
          type: string
          x-stoplight:
            id: dr74tyqv2gdum
          description: Algorithm to be used for encryption with the key.
          default: RSA-OAEP-256
          example: RSA-OAEP-256
        'n':
          type: string
          x-stoplight:
            id: oob2wtthc6z3f
          description: The `RSA` public key modulus part.
          example: y7WkT3qvY...
        e:
          type: string
          x-stoplight:
            id: 0y1cx2eu3ydqc
          description: The `RSA` public key exponent part.
          example: AQAB
          default: AQAB
    JWE:
      title: JWE
      x-stoplight:
        id: ssz9qqzasc97h
      type: string
      description: |-
        The structure containing the encrypted payload. It is described by [RFC 7516: JSON Web Encryption (JWE)](https://datatracker.ietf.org/doc/html/rfc7516)

        The JWE has 5 parts:
        1. `header` -> contains JSON serialized [JWE header](#jwe-header)
        2. `encrypted_key` -> contains the CEK (Content Encryption Key) encrypted by the public JWK
        3. `iv` -> initiation vector used for content encryption
        4. `ciphertext` -> contains the [Encrypted card](#encrypted-card)
        5. `tag` -> encryption authentication tag

        Each of these parts is Base64URL-encoded and concatenated using dots so the overall structure is:
        `BASE64URL(header).BASE64URL(encrypted_key).BASE64URL(iv).BASE64URL(ciphertext).BASE64URL(tag)`
      examples:
        - eyJalgIjoiUlNBLU9BRVAtMjU2IiwiZW5jIjoiQTI1NkdDTSIsImtpZCI6ImtleV8yMDI1MDQwNl8wMDEifQ.aG93ZGlkYmFzZTY0.dGhpc2lzdGhlaXY.ZW5jcnlwdGVkY2FyZGhvbGRlcmRhdGE.YXV0aHRhZw
    JWE-header:
      title: JWE-header
      x-stoplight:
        id: wrqnni8r8w73w
      type: object
      description: 'The header for the JWE payload described by [RFC 7516 Section 4](https://datatracker.ietf.org/doc/html/rfc7516#section-4)'
      examples:
        - alg: RSA-OAEP-256
          enc: A256GCM
          kid: key_20250406
          typ: JWE
      required:
        - alg
        - enc
        - kid
        - typ
      properties:
        alg:
          type: string
          example: RSA-OAEP-256
          x-stoplight:
            id: el6d41dkwq96s
          description: Must be same as JWK
        enc:
          type: string
          default: A256GCM
          example: A256GCM
          x-stoplight:
            id: 2bvugej7b54ex
          description: The algorithm used to encrypt the content. `A256GCM` is preferred.
        kid:
          type: string
          x-stoplight:
            id: 1h1pqyq0kw929
          description: Must be same as JWK
        typ:
          type: string
          x-stoplight:
            id: jo6hro2546fwd
          const: JWE
          example: JWE
    Encrypted-card:
      title: Encrypted-card
      x-stoplight:
        id: tdktp40r4emyq
      type: object
      required:
        - card_pan
        - exp_month
        - exp_year
        - cvv
      properties:
        card_pan:
          type: string
          x-stoplight:
            id: j4myyupxs5rfr
          description: 'Primary Account Number (i.e., the credit/debit card number). Usually encrypted.'
          example: '4444444444444448'
          format: pan
        exp_month:
          type: string
          x-stoplight:
            id: eg1jmep891py7
          description: 'Expiration month of the card (e.g., "03" for March).'
          pattern: '^(?:0[0-9]|1[0-2])$'
          example: '01'
        exp_year:
          type: string
          x-stoplight:
            id: zknysx70fetjg
          description: 'Expiration year of the card (e.g., "2027").'
          pattern: '^[0-9]{2}$'
          example: '30'
        cvv:
          type: string
          x-stoplight:
            id: 8h0kto47ol203
          description: |
            Card Verification Value. Should be encrypted as well.
          example: '123'
          pattern: '^[0-9]{3}$'
      examples:
        - card_pan: '4444444444444448'
          exp_month: '01'
          exp_year: '30'
          cvv: '123'
    Onetime-Card-Token-Response:
      title: Onetime Card Token Response
      x-stoplight:
        id: gobcb08shom3z
      type: object
      required:
        - masked_pan
        - expiration_month
        - expiration_year
        - scheme
        - corporate
        - fingerprint
        - token
      properties:
        masked_pan:
          type: string
          x-stoplight:
            id: 726dujfuxhzml
          example: 406821******1234
        expiration_month:
          type: string
          x-stoplight:
            id: rix34swuiutmj
          example: '01'
          pattern: '^(?:0[0-9]|1[0-2])$'
        expiration_year:
          type: string
          x-stoplight:
            id: k9hm2d6gzzho0
          pattern: '^[0-9]{2}$'
          example: '30'
        scheme:
          $ref: '#/components/schemas/Card-scheme'
          x-stoplight:
            id: hivpyu6wq4f8s
        corporate:
          type: boolean
          x-stoplight:
            id: dvuarb4nai82y
          default: false
        fingerprint:
          type: string
          x-stoplight:
            id: d4gtbzjya55rj
          example: 73c8d0a48d91def897612b54e630997745e1faad43045e732189cfe4acf4961b
        token:
          type: string
          x-stoplight:
            id: hzu43x2sh88zh
          example: J7HjFNwzyBOHS+jwIMMktubTwoIRy6qB/4opvjGcKtjv9DtCT3HLSlWHRYAbVTBLbouV77YtVSgavhi4uRZTwDy218Gog4MbZJ+umL/BkfFlNQ80PCdOjwYr8DtqZr71LHwkvg91ywirZp0=
        expires_in:
          x-stoplight:
            id: dplhy78wnid3b
          type: string
          example: '3600'
          pattern: '^[0-9]+$'
        brand:
          type: string
          x-stoplight:
            id: lc27qvipyjsce
          example: GOLD
        service_type:
          $ref: '#/components/schemas/Card-Service-Type'
          x-stoplight:
            id: n1kqpdqwt9uhy
      examples:
        - masked_pan: 406821******1234
          expiration_month: '01'
          expiration_year: '30'
          scheme: VISA
          corporate: false
          fingerprint: 73c8d0a48d91def897612b54e630997745e1faad43045e732189cfe4acf4961b
          token: J7HjFNwzyBOHS+jwIMMktubTwoIRy6qB/4opvjGcKtjv9DtCT3HLSlWHRYAbVTBLbouV77YtVSgavhi4uRZTwDy218Gog4MbZJ+umL/BkfFlNQ80PCdOjwYr8DtqZr71LHwkvg91ywirZp0=
          expires_in: '3600'
          brand: GOLD
          service_type: DEBIT
    Permanent-Card-Token-Response:
      title: Permanent Card Token Response
      x-stoplight:
        id: 5xx4ur0wljx8q
      type: object
      examples:
        - card_id: '8007127320'
          masked_pan: 406821******1234
          masked_virtual_pan: 489537******6287
          expiration_month: '01'
          expiration_year: '30'
          scheme: VISA
          corporate: false
          fingerprint: 73c8d0a48d91def897612b54e630997745e1faad43045e732189cfe4acf4961b
          token: J7HjFNwzyBOHS+jwIMMktubTwoIRy6qB/4opvjGcKtjv9DtCT3HLSlWHRYAbVTBLbouV77YtVSgavhi4uRZTwDy218Gog4MbZJ+umL/BkfFlNQ80PCdOjwYr8DtqZr71LHwkvg91ywirZp0=
          card_art_url: 'https://card.art/pic.png'
          brand: GOLD
          service_type: DEBIT
      required:
        - card_id
        - masked_pan
        - masked_virtual_pan
        - expiration_month
        - expiration_year
        - scheme
        - corporate
        - fingerprint
        - token
        - card_art_url
      properties:
        card_id:
          type: string
          x-stoplight:
            id: x70hnh07j1xta
          example: '8007127320'
        masked_pan:
          type: string
          example: 406821******1234
        masked_virtual_pan:
          type: string
          x-stoplight:
            id: j5hmnuau49lg8
          example: 489537******6287
        expiration_month:
          type: string
          example: '01'
          pattern: '^(?:0[0-9]|1[0-2])$'
        expiration_year:
          type: string
          pattern: '^[0-9]{2}$'
          example: '30'
        scheme:
          $ref: '#/components/schemas/Card-scheme'
        corporate:
          type: boolean
          default: false
        fingerprint:
          type: string
          example: 73c8d0a48d91def897612b54e630997745e1faad43045e732189cfe4acf4961b
        token:
          type: string
          example: J7HjFNwzyBOHS+jwIMMktubTwoIRy6qB/4opvjGcKtjv9DtCT3HLSlWHRYAbVTBLbouV77YtVSgavhi4uRZTwDy218Gog4MbZJ+umL/BkfFlNQ80PCdOjwYr8DtqZr71LHwkvg91ywirZp0=
        card_art_url:
          type: string
          x-stoplight:
            id: 57xz64sl6b2cu
          example: 'https://card.art/pic.png'
          format: uri
        brand:
          type: string
          example: GOLD
        service_type:
          $ref: '#/components/schemas/Card-Service-Type'
    Card-scheme:
      title: Card scheme
      x-stoplight:
        id: w4wi43hnlhl6r
      enum:
        - VISA
        - MASTERCARD
    Card-Service-Type:
      title: Card Service Type
      x-stoplight:
        id: tuaikp23qvb23
      enum:
        - DEBIT
        - CREDIT
    Payment-Charge-Input:
      title: Payment Charge Input
      x-stoplight:
        id: ypcfdisbe5uuc
      type: object
      properties:
        payment_instrument:
          $ref: '#/components/schemas/Payment-Charge-Data'
          x-stoplight:
            id: n2cxqwltyyixz
        return_url:
          type: string
          x-stoplight:
            id: lbhlhia9jkabu
          format: url
          example: 'https://example.com/return'
      examples:
        - payment_instrument:
            payment_instrument: PAYMENT_CARD
            input:
              input_type: CARD_TOKEN
              card_token: J7HjFNwzyBOHS+jwIMMktubTwoIRy6qB/4opvjG...
              challenge_preferrence: AUTO
          return_url: 'https://example.com/return'
        - payment_instrument:
            payment_instrument: BANK_ACCOUNT
            input:
              input_type: ACCOUNT_TOKEN
              account_token: f14e5acc2d86480fb50e254c8a3c3164
          return_url: 'https://example.com/return'
    Payment-Charge-Data:
      title: Payment-Charge-Data
      required:
        - payment_instrument
      discriminator:
        propertyName: payment_instrument
        mapping:
          PAYMENT_CARD: '#/components/schemas/Payment-Card-Charge-Data'
          BANK_ACCOUNT: '#/components/schemas/Bank-Account-Charge-Data'
      x-stoplight:
        id: tpeorakie6tae
      oneOf:
        - $ref: '#/components/schemas/Payment-Card-Charge-Data'
        - $ref: '#/components/schemas/Bank-Account-Charge-Data'
          x-stoplight:
            id: 1c1y81pkrhval
      examples:
        - payment_instrument: PAYMENT_CARD
          input:
            input_type: CARD_TOKEN
            card_token: J7HjFNwzyBOHS+jwIMMktubTwoIRy6qB/4opvjG...
            challenge_preferrence: AUTO
        - payment_instrument: BANK_ACCOUNT
          input:
            input_type: ACCOUNT_TOKEN
            account_token: f14e5acc2d86480fb50e254c8a3c3164
    Payment-Instrument:
      title: Payment Instrument
      x-stoplight:
        id: x3xyv4fy5blzy
      enum:
        - PAYMENT_CARD
        - BANK_ACCOUNT
    Payment-Card-Charge-Data:
      title: Payment Card Charge Data
      x-stoplight:
        id: ngpor8q7ykq07
      type: object
      required:
        - payment_instrument
        - input
      properties:
        payment_instrument:
          type: string
          const: PAYMENT_CARD
          x-stoplight:
            id: lbabjq8y8hsxu
        input:
          $ref: '#/components/schemas/Payment-Card-Input'
          x-stoplight:
            id: 1k6e7g40lw5cc
      examples:
        - payment_instrument: PAYMENT_CARD
          input:
            input_type: CARD_TOKEN
            card_token: J7HjFNwzyBOHS+jwIMMktubTwoIRy6qB/4opvjG...
            challenge_preferrence: AUTO
    Payment-Card-Input:
      title: Payment Card Input
      required:
        - input_type
      x-stoplight:
        id: jq603a1vywo3a
      discriminator:
        propertyName: input_type
        mapping:
          CARD_TOKEN: '#/components/schemas/Card-Token-Input'
