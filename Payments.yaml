        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '409':
          $ref: '#/components/responses/Conflict-409-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      operationId: get-payments-payment_id-qr-payment-info
      parameters:
        - schema:
            type: string
            example: application/json
            default: application/json
          in: header
          name: Accept
          description: application/json
        - schema:
            type: string
            enum:
              - png
              - svg
            example: png
            default: png
          in: query
          name: format
          description: File format of the generated base64
      x-stoplight:
        id: dvab3szgjw238
      security:
        - clientCredentials:
            - 'payment:read'
      tags:
        - Payments
  '/payments/{payment_id}/google-pay/info':
    parameters:
      - schema:
          type: string
        name: payment_id
        in: path
        required: true
    get:
      summary: Google Pay Payment Info
      tags:
        - Payments
      responses:
        '200':
          $ref: '#/components/responses/Google-Pay-Info-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '409':
          $ref: '#/components/responses/Conflict-409-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      operationId: get-payments-payment_id-info-google-pay
      x-stoplight:
        id: o935ttq3967v5
      parameters:
        - schema:
            type: string
            example: application/json
            default: application/json
          in: header
          name: Accept
          description: application/json
      security:
        - clientCredentials:
            - 'payment:read'
  '/payments/{payment_id}/apple-pay/info':
    parameters:
      - schema:
          type: string
        name: payment_id
        in: path
        required: true
    get:
      summary: Apple Pay Payment Info
      tags:
        - Payments
      responses:
        '200':
          $ref: '#/components/responses/Apple-Pay-Info-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '409':
          $ref: '#/components/responses/Conflict-409-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      operationId: get-payments-payment_id-info-apple-pay
      parameters:
        - schema:
            type: string
            example: application/json
            default: application/json
          in: header
          name: Accept
          description: application/json
      x-stoplight:
        id: ewnyiw719coe8
      security:
        - clientCredentials:
            - 'payment:read'
  '/payments/{payment_id}/apple-pay/validate':
    parameters:
      - schema:
          type: string
        name: payment_id
        in: path
        required: true
    post:
      summary: Validate Merchant
      tags:
        - Payments
      responses:
        '200':
          $ref: '#/components/responses/Validate-Merchant-Response'
        '400':
          description: Bad Request
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '409':
          $ref: '#/components/responses/Conflict-409-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      operationId: post-payments-payment_id-apple-pay-validate
      x-stoplight:
        id: gb1p7yi5l70cd
      parameters:
        - schema:
            type: string
          in: header
          name: Origin
          description: The origin of the document where the payment button is displayed (added automatically in AJAX)
          required: true
      security:
        - clientCredentials:
            - 'payment:create'
  '/cards/tokens/{card_id}':
    parameters:
      - schema:
          type: string
        name: card_id
        in: path
        required: true
    get:
      summary: Card details
      tags:
        - Cards
      responses:
        '200':
          $ref: '#/components/responses/Card-Token-Details-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      operationId: get-cards-tokens-card_id
      x-stoplight:
        id: ifuuio45fka6d
      security:
        - clientCredentials:
            - 'card:read'
    delete:
      summary: Delete a card
      tags:
        - Cards
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '404':
          $ref: '#/components/responses/Not-Found-404-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      operationId: delete-cards-tokens-card_id
      x-stoplight:
        id: 9u6vv704glfad
  /cards/tokens:
    post:
      summary: Create card token
      tags:
        - Cards
      responses:
        '201':
          $ref: '#/components/responses/Card-Token-Response'
        '400':
          $ref: '#/components/responses/Bad-Request-400-Response'
        '401':
          $ref: '#/components/responses/Unauthorized-401-Response'
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '409':
          $ref: '#/components/responses/Conflict-409-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      operationId: post-cards-tokens
      x-stoplight:
        id: z527w3pj6p22i
      security:
        - clientCredentials:
            - 'card:save'
      parameters:
        - $ref: '#/components/parameters/Accept-Json'
      requestBody:
        $ref: '#/components/requestBodies/Card-Token-Request'
  /encryption/public-key:
    get:
      summary: Fetch public key
      tags:
        - Cards
      responses:
        '200':
          $ref: '#/components/responses/JWK-Response'
        '401':
          description: Unauthorized
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      operationId: get-encryption-public-key
      x-stoplight:
        id: fzmjk8f7jgxx5
      description: |-
        Returns the public encryption key to be used for encrypting card data.

        It is structured as a JWK described by [RFC 7517](https://datatracker.ietf.org/doc/html/rfc7517)
      security:
        - clientCredentials:
            - 'card:save'
      parameters:
        - $ref: '#/components/parameters/Accept-Json'
  /encryption/card-form-url:
    get:
      summary: Card Form URL
      tags:
        - Cards
      responses:
        '200':
          $ref: '#/components/responses/Card-Form-URL-Response'
        '401':
          description: Unauthorized
        '403':
          $ref: '#/components/responses/Forbidden-403-Response'
        '500':
          $ref: '#/components/responses/Internal-Server-Error-500-Response'
      operationId: get-card-form-url
      description: Returns the URL of the hosted card input form
      security:
        - clientCredentials:
            - 'card:save'
      parameters:
        - $ref: '#/components/parameters/Accept-Json'
      x-stoplight:
        id: ki9gktw5912l0
    parameters: []
components:
  schemas:
    Token-Scope:
      title: Token Scope
      x-stoplight:
        id: 9hljgzmc9vd6y
      enum:
        - 'card:save'
        - 'card:read'
        - 'payment:create'
        - 'payment:read'
      examples:
        - 'payment:create'
      description: Supported token scopes
    Client-Credentials-Request:
      title: Client Credentials Request
      x-stoplight:
        id: ae4lyuzkwrcpv
      type: object
      examples:
        - grant_type: client_credentials
          scope: 'payment:create payment:read'
      required:
        - grant_type
        - scope
      properties:
        grant_type:
          type: string
          const: client_credentials
          example: client_credentials
          x-stoplight:
            id: u47ylvp7tc3nz
          description: Always `client_credentials` for this flow
        scope:
          x-stoplight:
            id: 5t619bidw05e0
          type: string
          example: 'payment:create payment:read'
          description: 'List of required token scopes, separated with a space. See Token Scope schema for possible values.'
      description: Request the token pair using the `client_credentials` grant type
    Refresh-Token-Request:
      title: Refresh Token Request
      x-stoplight:
        id: m04y2ncd42qyw
      type: object
      examples:
        - grant_type: refresh_token
          refresh_token: 2f53a04d4dd749f6a2a81285da72f67a
          client_id: '123456'
      required:
        - grant_type
        - refresh_token
        - client_id
      properties:
        grant_type:
          type: string
          const: refresh_token
          example: refresh_token
        refresh_token:
          type: string
          x-stoplight:
            id: 7vi9r0rbbnrpr
          description: Refresh token value from previous authentication
        client_id:
          type: string
          x-stoplight:
            id: x78lboi99jhfe
          description: Client ID associated with the refresh token. This can be extracted from the JWT.
      description: Request the token pair using the `refresh_token` grant type
    Token-Pair:
      title: Token-Pair
      x-stoplight:
        id: 5tjecoeucmkul
      type: object
      description: The access token and refresh token alongside useful meta information.
      properties:
        token_type:
          type: string
          example: bearer
          const: bearer
          default: bearer
          description: Always `bearer`
        access_token:
          $ref: '#/components/schemas/JWT'
          description: Access JWT
        refresh_token:
          type: string
          description: Refresh token value
          example: f14e5acc2d86480fb50e254c8a3c3164
        scope:
          type: string
          description: 'Space-separated list of token scopes, see Token Scope'
          example: 'payment:create payment:read'
        expires_in:
          type: integer
          minimum: 0
          example: 900
          description: The expiration of the access JWT in seconds
        refresh_expires_in:
          type: integer
          minimum: 0
          example: 86400
          description: The expiration of the refresh token in seconds
    JWT:
      title: JWT
      x-stoplight:
        id: 2yhqy5pem5rkm
      type: string
      description: |-
        The JWT string as described by [RFC 7519: JSON Web Token (JWT)](https://datatracker.ietf.org/doc/html/rfc7519)

        The JWT has 3 parts:
        1. `header` -> JSON serialized [JWT header](./q132gwiib06ov-jwt-header)
        2. `claims` -> Contains the main part of the token - see [JWT Claims](./1t7u4tgwic485-jwt-claims) for details
        3. `signature` -> Contains the cryptographic signature of the token

        Each of these parts is Base64URL-encoded and concatenated using dots so the overall structure is:
        `BASE64URL(header).BASE64URL(claims).BASE64URL(signature)`
      examples:
        - eyJraWQiOiJzaWduLTIwMjYtMDIiLCJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.eyJzdWIiOiJzZGsiLCJleHAiOjE3NzMzMjA0OTMsImlhdCI6MTc3MzMxOTU5Mywic2NvcGUiOiJwYXltZW50OmNyZWF0ZSBwYXltZW50OnJlYWQgY2FyZDpzYXZlIGNhcmQ6cmVhZCJ9.WlrmAZT9FLeuaHz9Gp79HeAZh8S0AtYEXbu4pOghXt4f3qv6xNHa8XX3AlvcnN3dKHD8VYWtVhLiUY2DFpGnKZQN97DY91lrStimpRSX9AY5xtOB1sZzNayEpu6MjspVv6IlNrcl2YHYFgqIN1GdFUCKCFetW9Vrm3IjSQCxWA7abo5XqxJyTP_ue7ybSz7y4xiUFNH8cIKpX0PEV3svyoXnbE58UEVktzIWsLA1PnjhtFcxsWT5y1Y_bR8OVxUVTiS0TfMoA1ETQ9ybI7IbX3sttzXnRfnwsn0iS5g96NrrJh2wDvSFQ2fwO_xO-VYl6dHI8tkGDV7JYvFOZ_i7uw
      format: jwt
    JWT-header:
      title: JWT-header
      x-stoplight:
        id: q132gwiib06ov
      type: object
      examples:
        - alg: RS256
          typ: JWT
          kid: key-2025-04
      required:
        - alg
        - typ
        - kid
      properties:
        alg:
          type: string
          const: HS256
          example: RS256
          x-stoplight:
            id: 29g0cs0uih4bl
        typ:
          type: string
          const: JWT
          example: JWT
          x-stoplight:
            id: akd8sbadr9eeb
        kid:
          type: string
          example: key-2025-04
          x-stoplight:
            id: 90avrb11vcz01
          description: Key ID that was used to sign the token
    JWT-claims:
      title: JWT-claims
      x-stoplight:
        id: 1t7u4tgwic485
      type: object
      properties:
        sub:
          type: string
          x-stoplight:
            id: v7u8u16kyswxt
          description: The client ID for which the token has been issued
        scope:
          type: string
          x-stoplight:
            id: lbfufsbk465oi
          description: 'Space-separated list of [scopes](#scope)'
        iat:
          type: integer
          x-stoplight:
            id: p4cxvjh5cta6a
          description: Timestamp of when the token was issued
        exp:
          type: integer
          x-stoplight:
            id: g1hr5bhrxehmp
          description: Timestamp of the token expiration
      examples:
        - sub: client_id_123
          scope: 'payments:read payments:write'
          iat: 1712640000
          exp: 1712643600
    Payment-Create-Request:
      title: Payment-Create-Request
      x-stoplight:
        id: 7milp4c7iiygl
      type: object
      required:
        - amount
        - currency
        - order_number
        - customer
        - callback
      properties:
        amount:
          type: integer
          minimum: 0
          example: 100
          description: Total amount in cents
        currency:
          $ref: '#/components/schemas/Currency'
          description: Payment currency
        order_number:
          type: string
          maxLength: 128
          example: '2025010199'
          description: 'Order identification for the online shop, alphanumeric characters'
        order_description:
          type: string
          description: 'Order description, alphanumeric characters'
          example: Test order
        additional_params:
          type: array
          maxItems: 4
          description: Additional parameters for the payment
          items:
            $ref: '#/components/schemas/Additional-Param'
        customer:
          $ref: '#/components/schemas/Customer'
          x-stoplight:
            id: den7ms6tfaazd
          description: Information about the customer
        callback:
          $ref: '#/components/schemas/Payment-Callback'
          x-stoplight:
            id: sv4s1flynjcv9
          description: Callback urls
      examples:
        - amount: 100
          currency: CZK
          order_number: '2025010199'
          order_description: Test order
          additional_params:
            - name: Custom param
              value: Custom value
          customer:
            email: john.doe@example.com
            first_name: John
            last_name: Doe
            phone_number: '+420123456789'
            city: Testington
            street: Example st. 10
            postal_code: '10000'
            country_code: CZE
            customer_id: customer420
          callback:
            notification_url: 'https://example.com/notify'
            return_url: 'https://example.com/return'
      description: Representation of a request for a new payment
    Payment-Details:
      title: Payment-Details
      x-stoplight:
        id: y80x95j15qtwv
      type: object
      examples:
        - id: '300000001'
          order_number: '2025010199'
          state: CREATED
          amount: 100
          currency: CZK
          customer:
            email: john.doe@example.com
            first_name: John
            last_name: Doe
            phone_number: '+420123456789'
            city: Testington
            street: Example st. 10
            postal_code: '10000'
            country_code: CZE
            customer_id: customer420
          gw_url: string
          charge:
            id: '9123456789'
            state: REQUESTED
            href: 'https://api.gopay.com/api/4.0/payments/9123456789/charge'
      description: Representation of an existing payment
      required:
        - id
        - order_number
        - state
        - amount
        - currency
        - customer
        - gw_url
      properties:
        id:
          type: string
          description: Payment session ID
          example: '300000001'
        order_number:
          type: string
          description: Order ID forwarded from the payment request
          example: '2025010199'
        state:
          $ref: '#/components/schemas/Payment-State'
          description: Payment state
        amount:
          type: integer
          description: |
            Total amount in cents
          example: 100
        currency:
          $ref: '#/components/schemas/Currency'
          description: |
            Payment currency
        customer:
          $ref: '#/components/schemas/Customer'
          description: Customer data
        gw_url:
          type: string
          description: URL of the hosted payment gateway
        charge:
          $ref: '#/components/schemas/Payment-Charge-Ref'
          x-stoplight:
            id: e1eoaglqtmgrk
    Currency:
