components:
  parameters:
    Accept-Json:
      name: Accept
      in: header
      required: true
      schema:
        const: application/json
        default: application/json
        examples:
          - application/json
  requestBodies:
    Access-Token-Request:
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            oneOf:
              - $ref: '#/components/schemas/Client-Credentials-Request'
              - $ref: '#/components/schemas/Refresh-Token-Request'
              - $ref: '#/components/schemas/Authorization-Code-Request'
                x-stoplight:
                  id: uk5dzxkdfjmc6
          examples:
            Client Credentials:
              value:
                grant_type: client_credentials
                scope: 'payment:create payment:read'
            Refresh Token:
              value:
                grant_type: refresh_token
                refresh_token: 2f53a04d4dd749f6a2a81285da72f67a
                client_id: '123456'
    Recurrence-Next-Request:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Payment-Update-Request'
  securitySchemes:
    merchant_credentials:
      type: oauth2
      flows:
        clientCredentials:
          refreshUrl: /oauth2/token
          scopes:
            'card:write': Used to tokenize payment cards
            'card:read': Used to read data about payment cards
            'payment:write': 'Used to create, charge or modify payments'
            'payment:read': Used to read data about payments
            'shared:read': Used to get shared information like public keys and URLs.
          tokenUrl: /oauth2/token
    client_secret:
      type: http
      description: |-
        Use `client_id:client_secret` encoded in base64 in the Authorization header.
        Only usable with the `/oauth2/token` endpoint using the `client_credentials` grant type.
        See [RFC7617](https://www.rfc-editor.org/rfc/rfc7617) for specification
      scheme: basic
    payment_secret:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: ''
          tokenUrl: /oauth2/token
          refreshUrl: /oauth2/token
          scopes:
            'payment:read': Used to read data about payments
            'payment:charge': Used solely to charge an existing payment
    sharable_key:
      type: http
      scheme: basic
      description: |-
        Use `client_id:sharable_key` encoded in base64 in the Authorization header.
        Used to authenticate to endpoints holding public resources such as public key and URLs.
        See [RFC7617](https://www.rfc-editor.org/rfc/rfc7617) for specification
