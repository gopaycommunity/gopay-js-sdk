image: node:24

definitions:
  caches:
    yarn-global: ~/.yarn
    yarn-cache: .yarn/cache

  services:
    docker2x:
      type: docker
      memory: 4096

  steps:
    - step: &code-quality
        name: Code Quality Checks
        caches:
          - yarn-global
          - yarn-cache
        script:
          - corepack enable
          - yarn install --immutable
          - yarn dedupe --check
          - yarn ci
          - yarn npm audit --recursive --environment production


    # --- unit + e2e tests + coverage ---------------------------------
    # E2E requires repository variables (mark as Secured in Bitbucket settings):
    #   GP_GW_JS_SDK_BASE_URL, GP_GW_JS_SDK_CLIENT_ID, GP_GW_JS_SDK_CLIENT_SECRET
    - step: &test-vitest
        name: Tests & coverage
        caches:
          - yarn-global
          - yarn-cache
        script:
          - corepack enable
          - yarn install --immutable
          - yarn workspace gopay-js-sdk run test
        artifacts:
          - sdk/coverage/**
          - sdk/test-results/**

    - step: &sonar
        name: Analyze on SonarCloud
        size: 2x
        services:
          - docker2x
        clone:
          depth: full
        script:
          - pipe: sonarsource/sonarcloud-scan:4.1.0
            variables:
              SONAR_SCANNER_OPTS: -Xmx2560m
              EXTRA_ARGS: -Dsonar.projectKey=gp-gopay_gp-gw-js-sdk
                -Dsonar.organization=gp-gopay
                -Dsonar.sources=sdk/src
                -Dsonar.tests=sdk/tests
                -Dsonar.inclusions=sdk/src/**/*.ts
                -Dsonar.exclusions=**/*.spec.ts,**/*.test.ts,sdk/src/types/generated.ts
                -Dsonar.javascript.lcov.reportPaths=sdk/coverage/lcov.info
          - pipe: sonarsource/sonarcloud-quality-gate:0.2.0

    - step: &release-preview
        name: Release preview (dry-run)
        caches:
          - yarn-global
          - yarn-cache
        script:
          - corepack enable
          - yarn install --immutable
          - cd sdk && yarn dlx semantic-release --dry-run --no-ci

    - step: &build
        name: Build SDK
        caches:
          - yarn-global
          - yarn-cache
        script:
          - corepack enable
          - yarn install --immutable
          - yarn workspace gopay-js-sdk run build
        artifacts:
          - sdk/dist/**
 
    - step: &test-playwright
        name: Browser smoke test (IIFE)
        image: mcr.microsoft.com/playwright:v1.59.1-noble
        caches:
          - yarn-global
          - yarn-cache
        script:
          - corepack enable
          - yarn install --immutable
          - yarn workspace gopay-js-sdk run build
          - yarn test:e2e
        artifacts:
          - playwright-report/**

    - step: &release
        name: Release
        deployment: production
        caches:
          - yarn-global
          - yarn-cache
        script:
          - corepack enable
          - yarn install --immutable
          - yarn workspace gopay-js-sdk run build
          # semantic-release: bumps version, tags commit, publishes npm, uploads CDN
          # Required secrets: NPM_TOKEN, BB_TOKEN (Bitbucket access token)
          - cd sdk && yarn dlx semantic-release

pipelines:
  branches:
    master:
      - parallel:
        - step: *test-vitest
        - step: *build
        - step: *test-playwright
      - parallel:
        - step: *sonar
      - step: *release
  pull-requests:
    '**':
      - parallel:
          - step: *code-quality
          - step: *test-vitest
          - step: *release-preview
          - step: *test-playwright
      - parallel:
          - step: *sonar
      