image: node:24

definitions:
  caches:
    yarn-global: ~/.yarn
    yarn-cache: .yarn/cache

  services:
    docker2x:
      type: docker
      memory: 4096

  steps:
    - step: &code-quality
        name: Code Quality Checks
        caches:
          - yarn-global
          - yarn-cache
        script:
          - corepack enable
          - yarn install --immutable
          - yarn dedupe --check
          - yarn ci
          - yarn npm audit --recursive --environment production


    # --- unit + e2e tests + coverage ---------------------------------
    # E2E requires repository variables (mark as Secured in Bitbucket settings):
    #   GOPAY_PAYMENTS_V4_BASE_URL, GOPAY_PAYMENTS_V4_CLIENT_ID, GOPAY_PAYMENTS_V4_CLIENT_SECRET,
    #   GOPAY_PAYMENTS_V4_GOID, GOPAY_PAYMENTS_V4_SHAREABLE_KEY
    - step: &test-vitest
        name: Tests & coverage
        runs-on:
          - cypress
        caches:
          - yarn-global
          - yarn-cache
        script:
          - corepack enable
          - yarn install --immutable
          - yarn workspace @gopaycz/gopay-js-sdk run test
          - yarn workspace @gopaycz/gopay-js-sdk-browser run test
          - sed -i 's|^SF:src/|SF:sdk/src/|' sdk/coverage/lcov.info
          - sed -i 's|^SF:src/|SF:browser-sdk/src/|' browser-sdk/coverage/lcov.info
        artifacts:
          - sdk/coverage/**
          - sdk/test-results/**
          - browser-sdk/coverage/**
          - browser-sdk/test-results/**

    - step: &test-stress
        name: Stress tests (leak detection)
        caches:
          - yarn-global
          - yarn-cache
        script:
          - corepack enable
          - yarn install --immutable
          - yarn workspace @gopaycz/gopay-js-sdk-browser run test:stress
        artifacts:
          - browser-sdk/test-results/stress-junit.xml

    - step: &sonar
        name: Analyze on SonarCloud
        size: 2x
        services:
          - docker2x
        clone:
          depth: full
        script:
          - pipe: sonarsource/sonarcloud-scan:4.1.0
            variables:
              SONAR_SCANNER_OPTS: -Xmx2560m
              EXTRA_ARGS: -Dsonar.projectKey=gp-gopay_gp-gw-js-sdk
                -Dsonar.organization=gp-gopay
                -Dsonar.sources=sdk/src,browser-sdk/src
                -Dsonar.tests=sdk/tests
                -Dsonar.inclusions=sdk/src/**/*.ts,browser-sdk/src/**/*.ts
                -Dsonar.exclusions=**/*.spec.ts,**/*.test.ts,sdk/src/types/generated.ts,browser-sdk/src/types/generated.ts
                -Dsonar.javascript.lcov.reportPaths=sdk/coverage/lcov.info,browser-sdk/coverage/lcov.info
          - pipe: sonarsource/sonarcloud-quality-gate:0.2.0

    - step: &release-preview
        name: Release preview (dry-run)
        caches:
          - yarn-global
          - yarn-cache
        script:
          - corepack enable
          - yarn install --immutable
          # --branches overrides the configured 'master' release branch so the dry-run analyzes
          # THIS branch's own commits instead of always reporting "wrong branch, skipping".
          # sdk/ is the umbrella version (analyzes ALL commits repo-wide, see release.config.mjs),
          # so if IT finds nothing releasable, nothing in the whole PR is fix/feat/BREAKING CHANGE —
          # fail so that doesn't silently merge and pile up unreleased. browser-sdk/ is filtered to
          # browser-sdk/ files only, so its own "no release" is often expected and not gated here.
          - |
            set +e
            SDK_DRY_RUN=$(cd sdk && yarn dlx semantic-release --dry-run --no-ci --branches "$BITBUCKET_BRANCH" 2>&1)
            SDK_EXIT=$?
            echo "$SDK_DRY_RUN"
            if [ $SDK_EXIT -ne 0 ]; then
              exit $SDK_EXIT
            fi
            if echo "$SDK_DRY_RUN" | grep -q "no relevant changes"; then
              echo ""
              echo "No release-worthy commit (fix/feat/BREAKING CHANGE) found — @gopaycz/gopay-js-sdk would not get a new version if this PR merges as-is."
              echo "Add a fix:/feat: commit (or a BREAKING CHANGE: footer) if this PR is meant to ship a release."
              exit 1
            fi
          - (cd browser-sdk && yarn dlx semantic-release --dry-run --no-ci --branches "$BITBUCKET_BRANCH")

    - step: &build
        name: Build SDK
        caches:
          - yarn-global
          - yarn-cache
        script:
          - corepack enable
          - yarn install --immutable
          - yarn workspace @gopaycz/gopay-js-sdk run build
          - yarn workspace @gopaycz/gopay-js-sdk-browser run build
        artifacts:
          - sdk/dist/**
          - browser-sdk/dist/**
 
    - step: &test-playwright
        name: Browser smoke test (IIFE)
        image: mcr.microsoft.com/playwright:v1.59.1-noble
        runs-on:
          - cypress
        caches:
          - yarn-global
          - yarn-cache
        script:
          - corepack enable
          - yarn install --immutable
          - yarn workspace @gopaycz/gopay-js-sdk run build
          - yarn test:e2e
        artifacts:
          - playwright-report/**

    - step: &release
        name: Release
        deployment: production
        caches:
          - yarn-global
          - yarn-cache
        script:
          - corepack enable
          - yarn install --immutable
          - yarn workspace @gopaycz/gopay-js-sdk run build
          - yarn workspace @gopaycz/gopay-js-sdk-browser run build
          - REPO_URL=https://gopay-release-bot:$BITBUCKET_BOT_PUSH_TOKEN@bitbucket.org/$BITBUCKET_REPO_FULL_NAME.git
          - git remote set-url origin $REPO_URL
          # semantic-release: bumps version, tags commit, updates CHANGELOG, publishes to npm
          # Requires NPM_PUSH_TOKEN set as a Secured repository variable in Bitbucket settings
          # sdk/ (@gopaycz/gopay-js-sdk) analyzes ALL commits and bumps on every releasable change — its
          # version drives the Docker deploy tag. browser-sdk/ (@gopaycz/gopay-js-sdk-browser) only bumps
          # when browser-sdk/ files changed (filtered by semantic-release-monorepo).
          - export YARN_NPM_AUTH_TOKEN=$NPM_PUSH_TOKEN
          - (cd sdk && yarn dlx semantic-release)
          - (cd browser-sdk && yarn dlx semantic-release)
          - npm pkg get version --prefix sdk | tr -d '"' > version
          - npm pkg get version --prefix browser-sdk | tr -d '"' > browser-sdk-version
        artifacts:
          - version
          - browser-sdk-version
    # Required secret: GITHUB_PERSONAL_ACCESS_TOKEN
    - step: &github-sync
        name: Sync master to GitHub
        clone:
          depth: full
        script:
          - git fetch origin master --tags
          - git remote add github https://${GITHUB_PERSONAL_ACCESS_TOKEN}@github.com/gopaycommunity/gopay-js-sdk.git
          # --force: GitHub's existing master/tags are the old orphan snapshot commits (unrelated
          # history to the real graph being pushed here for the first time). Without --force this
          # push is rejected as a non-fast-forward. Safe here — this mirror is sync-only, nothing
          # reads or builds from GitHub, so overwriting its history has no downstream effect.
          - git push github origin/master:refs/heads/master --force
          - git push github --tags --force

    - step: &docker-build-push
        name: Build & push example Docker image
        size: 2x
        services:
          - docker2x
        script:
          - ./scripts/bitbucket-config.sh
          - VERSION=$(cat version)
          - BROWSER_VERSION=$(cat browser-sdk-version)
          - IMAGE="repo.gopay.com/gp-gw-js-sdk:${VERSION}"
          - IMAGE_NOT_EXISTS=true; docker pull "$IMAGE" > /dev/null 2>&1 && IMAGE_NOT_EXISTS=false
          - if [ "$IMAGE_NOT_EXISTS" = true ]; then (docker build --build-arg SDK_VERSION="$VERSION" --build-arg BROWSER_SDK_VERSION="$BROWSER_VERSION" . -t "$IMAGE" && docker push "$IMAGE"); fi

    - step: &docker-build-dry-run
        name: Build example Docker image (dry-run)
        size: 2x
        services:
          - docker2x
        script:
          - ./scripts/bitbucket-config.sh
          - docker build --build-arg SDK_VERSION=dev . -t repo.gopay.com/gp-gw-js-sdk:latest

pipelines:
  branches:
    master:
      - parallel:
        - step: *test-vitest
        - step: *test-stress
        - step: *build
        - step: *test-playwright
      - step: *release
      - step: *docker-build-push
      - step: *github-sync
      - step: *sonar
  pull-requests:
    '**':
      - parallel:
          - step: *code-quality
          - step: *test-vitest
          - step: *test-stress
          - step: *release-preview
          - step: *test-playwright
          - step: *docker-build-dry-run
      - step: *sonar
