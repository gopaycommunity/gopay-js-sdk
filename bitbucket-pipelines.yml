image: node:24

definitions:
  caches:
    yarn-global: ~/.yarn
    yarn-cache: .yarn/cache

  services:
    docker2x:
      type: docker
      memory: 4096

  steps:
    - step: &code-quality
        name: Code Quality Checks
        caches:
          - yarn-global
          - yarn-cache
        script:
          - corepack enable
          - yarn install --immutable
          - yarn dedupe --check
          - yarn ci
          - yarn npm audit --recursive --environment production


    # --- unit + e2e tests + coverage ---------------------------------
    # E2E requires repository variables (mark as Secured in Bitbucket settings):
    #   GP_GW_JS_SDK_BASE_URL, GP_GW_JS_SDK_CLIENT_ID, GP_GW_JS_SDK_CLIENT_SECRET,
    #   GP_GW_JS_SDK_GOID, GP_GW_JS_SDK_PUBLISHABLE_KEY
    - step: &test-vitest
        name: Tests & coverage
        caches:
          - yarn-global
          - yarn-cache
        script:
          - corepack enable
          - yarn install --immutable
          - yarn workspace gopay-js-sdk run test
          - yarn workspace gopay-js-sdk-browser run test
        artifacts:
          - sdk/coverage/**
          - sdk/test-results/**
          - browser-sdk/coverage/**
          - browser-sdk/test-results/**

    - step: &sonar
        name: Analyze on SonarCloud
        size: 2x
        services:
          - docker2x
        clone:
          depth: full
        script:
          - pipe: sonarsource/sonarcloud-scan:4.1.0
            variables:
              SONAR_SCANNER_OPTS: -Xmx2560m
              EXTRA_ARGS: -Dsonar.projectKey=gp-gopay_gp-gw-js-sdk
                -Dsonar.organization=gp-gopay
                -Dsonar.sources=sdk/src,browser-sdk/src
                -Dsonar.tests=sdk/tests
                -Dsonar.inclusions=sdk/src/**/*.ts,browser-sdk/src/**/*.ts
                -Dsonar.exclusions=**/*.spec.ts,**/*.test.ts,sdk/src/types/generated.ts,browser-sdk/src/types/generated.ts
                -Dsonar.javascript.lcov.reportPaths=sdk/coverage/lcov.info,browser-sdk/coverage/lcov.info
          - pipe: sonarsource/sonarcloud-quality-gate:0.2.0

    - step: &release-preview
        name: Release preview (dry-run)
        caches:
          - yarn-global
          - yarn-cache
        script:
          - corepack enable
          - yarn install --immutable
          - (cd sdk && yarn dlx semantic-release --dry-run --no-ci)
          - (cd browser-sdk && yarn dlx semantic-release --dry-run --no-ci)

    - step: &build
        name: Build SDK
        caches:
          - yarn-global
          - yarn-cache
        script:
          - corepack enable
          - yarn install --immutable
          - yarn workspace gopay-js-sdk run build
          - yarn workspace gopay-js-sdk-browser run build
        artifacts:
          - sdk/dist/**
          - browser-sdk/dist/**
 
    - step: &test-playwright
        name: Browser smoke test (IIFE)
        image: mcr.microsoft.com/playwright:v1.59.1-noble
        caches:
          - yarn-global
          - yarn-cache
        script:
          - corepack enable
          - yarn install --immutable
          - yarn workspace gopay-js-sdk run build
          - yarn test:e2e
        artifacts:
          - playwright-report/**

    - step: &release
        name: Release
        deployment: production
        caches:
          - yarn-global
          - yarn-cache
        script:
          - corepack enable
          - yarn install --immutable
          - yarn workspace gopay-js-sdk run build
          - yarn workspace gopay-js-sdk-browser run build
          - REPO_URL=https://gopay-release-bot:$BITBUCKET_BOT_PUSH_TOKEN@bitbucket.org/$BITBUCKET_REPO_FULL_NAME.git
          - git remote set-url origin $REPO_URL
          # semantic-release: bumps version, tags commit, updates CHANGELOG
          # npmPublish: false in both release.config.cjs — flip to true once NPM_TOKEN is set in Bitbucket variables
          # Each package only releases when its own files changed (filtered by semantic-release-monorepo)
          - (cd sdk && yarn dlx semantic-release)
          - (cd browser-sdk && yarn dlx semantic-release)
          - npm pkg get version --prefix sdk | tr -d '"' > version
        artifacts:
          - version
    # Required secret: GITHUB_PERSONAL_ACCESS_TOKEN
    - step: &github-sync
        name: Sync master to GitHub
        clone:
          depth: full
        script:
          - git fetch origin master --tags
          - git remote add github https://${GITHUB_PERSONAL_ACCESS_TOKEN}@github.com/gopaycommunity/gopay-js-sdk.git
          - git push github refs/remotes/origin/master:refs/heads/master --force
          - git push github --tags

    - step: &docker-build-push
        name: Build & push example Docker image
        size: 2x
        services:
          - docker2x
        script:
          - ./scripts/bitbucket-config.sh
          - VERSION=$(cat version)
          - IMAGE="repo.gopay.com/gp-gw-js-sdk:$VERSION"
          - IMAGE_NOT_EXISTS=true; docker pull "$IMAGE" > /dev/null 2>&1 && IMAGE_NOT_EXISTS=false
          - if [ "$IMAGE_NOT_EXISTS" = true ]; then (docker build --build-arg SDK_VERSION="$VERSION" . -t "$IMAGE" && docker push "$IMAGE"); fi

    - step: &docker-build-dry-run
        name: Build example Docker image (dry-run)
        size: 2x
        services:
          - docker2x
        script:
          - ./scripts/bitbucket-config.sh
          - docker build --build-arg SDK_VERSION=dev . -t repo.gopay.com/gp-gw-js-sdk:latest

pipelines:
  branches:
    master:
      - parallel:
        - step: *test-vitest
        - step: *build
        - step: *test-playwright
      - parallel:
        - step: *sonar
      - step: *release
      - step: *github-sync
      - step: *docker-build-push
  pull-requests:
    '**':
      - parallel:
          - step: *code-quality
          - step: *test-vitest
          - step: *release-preview
          - step: *test-playwright
      - parallel:
          - step: *sonar
      - step: *docker-build-dry-run
