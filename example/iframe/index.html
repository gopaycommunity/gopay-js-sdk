    padding: 8px 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
}
.gp-input:focus {
    border-color: #0066cc;
}
.gp-input.error {
    border-color: #cc0000;
}
.gp-error {
    font-size: 11px;
    color: #cc0000;
    min-height: 14px;
}
.gp-submit {
    padding: 10px;
    background: #0066cc;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
}
.gp-submit:hover {
    background: #0055aa;
}
.gp-submit:disabled {
    background: #aaa;
    cursor: not-allowed;
}
