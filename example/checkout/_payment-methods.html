<section class="bg-white rounded-2xl border border-[#E5E7EB] p-5 shadow-sm">

    <!-- Bootstrap error banner (hidden by default) -->
    <div id="checkout-error" class="hidden mb-4 rounded-xl bg-[#FEF2F2] border border-[#FECACA] px-4 py-3 text-sm text-[#B91C1C]">
        Platbu se nepodařilo připravit, zkuste to prosím znovu.
    </div>

    <!-- Initializing overlay -->
    <div id="checkout-loading" class="flex items-center justify-center gap-2 text-sm text-[#6B7280] py-4">
        <svg aria-hidden="true" class="animate-spin w-4 h-4 text-[#C8102E]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.4 0 0 5.4 0 12h4z"></path>
        </svg>
        <span>Připravujeme platbu…</span>
    </div>

    <!-- Main payment content (shown after bootstrap) -->
    <div id="payment-content" class="hidden space-y-4">

        <!-- Wallet buttons: Apple Pay + Google Pay side by side -->
        <div id="wallet-row" class="grid grid-cols-2 gap-3">
            <div id="wallet-col-applepay" class="min-w-0">
                <div id="applepay-button-container"></div>
            </div>
            <div id="wallet-col-gpay" class="min-w-0">
                <div id="gpay-button-container"></div>
            </div>
        </div>

        <!-- Ostatní platby divider -->
        <div class="flex items-center gap-3">
            <div class="flex-1 h-px bg-[#E5E7EB]"></div>
            <span class="text-xs font-semibold text-[#9CA3AF] uppercase tracking-wide whitespace-nowrap">Ostatní platby</span>
            <div class="flex-1 h-px bg-[#E5E7EB]"></div>
        </div>

        <!-- Secondary method buttons: Karta + QR -->
        <div class="grid grid-cols-2 gap-3">
            <button type="button" id="method-card-btn" class="method-secondary-btn flex items-center justify-center gap-2 px-4 py-3 rounded-xl border-2 border-[#E5E7EB] bg-white text-sm font-semibold text-[#374151] transition-all hover:border-[#C8102E] hover:text-[#C8102E]">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4 shrink-0">
                    <path d="M4 4h16a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2zm0 5h16v2H4V9zm2 5h4v2H6v-2z"/>
                </svg>
                Platba kartou
            </button>
            <button type="button" id="method-qr-btn" class="method-secondary-btn flex items-center justify-center gap-2 px-4 py-3 rounded-xl border-2 border-[#E5E7EB] bg-white text-sm font-semibold text-[#374151] transition-all hover:border-[#C8102E] hover:text-[#C8102E]">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4 shrink-0">
                    <path d="M3 3h6v6H3zm2 2v2h2V5zm8-2h6v6h-6zm2 2v2h2V5zM3 13h6v6H3zm2 2v2h2v-2zm13-2h1v1h-1zm-3 0h1v1h-1zm1 1h1v1h-1zm-1 1h1v1h-1zm1 1h1v1h-1zm1-1h1v1h-1zm1 1h1v1h-1zm0-3h1v1h-1zm-2 2h1v1h-1zm2-4h1v1h-1z"/>
                </svg>
                QR platba
            </button>
        </div>

        <!-- Card panel (initially hidden) -->
        <div id="panel-card" class="hidden space-y-3">
            <div id="card-iframe-container" class="min-h-[200px]"></div>
            <div id="pay-button-row">
                <button type="button" id="pay-btn" disabled class="w-full py-4 rounded-2xl text-base font-bold tracking-wide pay-btn-style transition-all" onclick="checkoutPay()">
                    Zaplatit 49 Kč
                </button>
            </div>
        </div>

        <!-- QR panel (initially hidden) -->
        <div id="panel-qr" class="hidden">
            <div id="qr-loading" class="flex items-center gap-2 text-sm text-[#6B7280] py-4">
                <svg aria-hidden="true" class="animate-spin w-4 h-4 text-[#C8102E] shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.4 0 0 5.4 0 12h4z"></path>
                </svg>
                <span>Načítáme QR kód…</span>
            </div>
            <div id="qr-content" class="hidden text-center py-2 space-y-3">
                <div id="qr-image-container"></div>
                <p class="text-sm text-[#6B7280]">Naskenujte QR kód v aplikaci vaší banky a potvrďte platbu 49 Kč.</p>
                <div class="flex items-center gap-2 justify-center text-xs text-[#9CA3AF]">
                    <svg aria-hidden="true" class="animate-spin w-3 h-3 text-[#C8102E]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.4 0 0 5.4 0 12h4z"></path>
                    </svg>
                    <span>Čekáme na potvrzení platby…</span>
                </div>
            </div>
        </div>

        <!-- Wallet / inline error banner -->
        <div id="payment-error-banner" class="hidden rounded-xl bg-[#FEF2F2] border border-[#FECACA] px-4 py-3 text-sm text-[#B91C1C]">
            Platba selhala. Zkuste to prosím znovu.
        </div>

    </div>

</section>
