<!-- Full-page status overlay — revealed by status.js after 3DS return or wallet payment -->
<div id="status-overlay" class="hidden fixed inset-0 bg-[#F5F5F5] z-50 flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl border border-[#E5E7EB] shadow-lg p-8 max-w-sm w-full text-center">

        <!-- Success state -->
        <div id="status-success" class="hidden">
            <div class="w-16 h-16 rounded-full bg-[#D1FAE5] flex items-center justify-center mx-auto mb-5">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-8 h-8 text-[#059669]">
                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                </svg>
            </div>
            <h2 class="text-xl font-bold text-[#111827] mb-2">Platba proběhla úspěšně</h2>
            <p class="text-sm text-[#6B7280]">Děkujeme! Přístup k Noviny Premium byl aktivován. Potvrzení zašleme na váš e-mail.</p>
        </div>

        <!-- Failure state -->
        <div id="status-failure" class="hidden">
            <div class="w-16 h-16 rounded-full bg-[#FEE2E2] flex items-center justify-center mx-auto mb-5">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-8 h-8 text-[#DC2626]">
                    <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
            </div>
            <h2 class="text-xl font-bold text-[#111827] mb-2">Platba se nezdařila</h2>
            <p class="text-sm text-[#6B7280] mb-5">Platbu se nepodařilo dokončit. Zkuste to prosím znovu.</p>
            <a href="checkout.html" class="inline-block px-6 py-3 rounded-full bg-[#C8102E] text-white text-sm font-bold hover:bg-[#A50D26] transition-colors">
                Zkusit znovu
            </a>
        </div>

        <!-- Loading state (while polling) -->
        <div id="status-loading">
            <svg aria-hidden="true" class="animate-spin w-10 h-10 text-[#C8102E] mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.4 0 0 5.4 0 12h4z"></path>
            </svg>
            <p class="text-sm text-[#6B7280]">Ověřujeme platbu…</p>
        </div>

    </div>
</div>
